<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Database cylinder body -->
  <rect x="6" y="10" width="20" height="14" rx="1" fill="#ffffff" opacity="0.15"/>
  <!-- Cylinder bottom ellipse -->
  <ellipse cx="16" cy="24" rx="10" ry="3.5" fill="#ffffff" opacity="0.3"/>
  <!-- Cylinder body outline -->
  <rect x="6" y="10" width="20" height="14" rx="1" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Cylinder left/right vertical edges -->
  <line x1="6" y1="10" x2="6" y2="24" stroke="#e5e7eb" stroke-width="1.5"/>
  <line x1="26" y1="10" x2="26" y2="24" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- Cylinder top ellipse -->
  <ellipse cx="16" cy="10" rx="10" ry="3.5" fill="#ffffff" opacity="0.25" stroke="#e5e7eb" stroke-width="1.5"/>
  <!-- SQL label -->
  <text x="16" y="20" text-anchor="middle" font-family="monospace" font-size="7" font-weight="700" fill="#f9fafb" opacity="0.9">SQL</text>
</svg>
